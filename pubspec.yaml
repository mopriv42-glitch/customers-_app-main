name: private_4t_app
description: A curriculum-aligned video and tutor booking app
publish_to: "none"
version: 1.1.19+105
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  intl: any
  dio: ^5.4.3+1
  go_router: ^14.0.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^17.1.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  audioplayers: ^6.5.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  device_info_plus: ^10.1.0
  share_plus: ^11.0.0
  riverpod_context: ^0.3.0
  fluttertoast: ^8.2.12
  package_info_plus: ^8.3.0
  upgrader: ^11.4.0
  awesome_notifications: ^0.10.1
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1
  easy_localization: ^3.0.8
  webview_flutter: ^4.13.0
  http: ^1.1.0
  timezone: ^0.9.2
  url_launcher: ^6.2.1
  flutter_linkify: ^6.0.0
  youtube_player_flutter: ^9.1.1
  video_player: ^2.10.0
  chewie: ^1.11.0
  syncfusion_flutter_pdfviewer: any
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  sqflite: ^2.3.3+1
  record: ^6.0.0
  # Matrix chat SDK (E2EE optional deps removed to avoid Rust toolchain requirement)
  matrix: ^1.1.1
  flutter_webrtc: 1.1.0
  flutter_overlay_window: ^0.5.0
  google_sign_in: ^7.1.1
  firebase_auth: ^6.0.1
  # Notification system dependencies
  flutter_callkit_incoming: ^2.5.8
  uuid: ^4.5.1
  path: any
  crypto: ^3.0.6
  pusher_channels_flutter: ^2.2.1
  open_filex: ^4.7.0

dependency_overrides:
  device_info_plus: ^11.0.0
  intl: ^0.20.0
  record_linux: ^1.1.1
  test_api: 0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/course_thumbnails/
    - languages/ar.json
    - languages/en.json
    - languages/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages
