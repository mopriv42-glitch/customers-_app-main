name: iOS Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode & SDK info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      # ── Flutter (cached) ──────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get

      # ── Ruby & Gems ───────────────────────────────────────
      # Ensure Gemfile.lock exists (required for bundler-cache)
      - name: Ensure Gemfile.lock exists
        run: |
          if [ ! -f Gemfile.lock ]; then
            echo "Gemfile.lock not found — generating..."
            bundle lock
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ── CocoaPods (cached) ────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile', 'pubspec.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && bundle exec pod install --repo-update

      # ── Build & Deploy ────────────────────────────────────
      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane ios deploy